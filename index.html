<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web2App Converter | Transform Websites into Mobile Apps</title>
    <meta name="description" content="Convert any website to a native Android APK effortlessly. Play Store ready builds in seconds." />
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ray.styni.com/" />
    <meta property="og:title" content="Web2App Converter | Transform Websites into Mobile Apps" />
    <meta property="og:description" content="Convert any website to a native Android APK effortlessly." />
    <meta property="og:image" content="https://picsum.photos/seed/web2app-meta/1200/630" />
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://ray.styni.com/" />
    <meta property="twitter:title" content="Web2App Converter | Transform Websites into Mobile Apps" />
    <meta property="twitter:description" content="Convert any website to a native Android APK effortlessly." />
    <meta property="twitter:image" content="https://picsum.photos/seed/web2app-meta/1200/630" />
  </head>
  <body style="background: #050505; margin: 0; padding: 0;">
    <div id="loading-fallback" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-family: 'Courier New', Courier, monospace; font-size: 11px; z-index: 1000; pointer-events: none; transition: opacity 0.5s ease;">
      <div id="status-spinner" style="width: 20px; height: 20px; border: 1px solid #333; border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px;"></div>
      <div id="status-text">INITIALIZING_CORE_v1.0.3...</div>
      <div id="error-details" style="margin-top: 15px; color: #f43f5e; display: none; text-align: center; max-width: 80%;">
        <p style="font-weight: bold; margin-bottom: 5px;">APPLICATION_CRASH</p>
        <code id="error-msg" style="background: #1a1a1a; padding: 4px 8px; border-radius: 4px; font-size: 10px;"></code>
      </div>
    </div>
    <div id="root"></div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.getElementById('status-spinner').style.display = 'none';
        document.getElementById('error-details').style.display = 'block';
        document.getElementById('error-msg').innerText = msg + " (" + lineNo + ":" + columnNo + ")";
        document.getElementById('status-text').style.color = '#777';
        return false;
      };

      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML === '' && !window.__WEB2APP_STARTED) {
          document.getElementById('status-spinner').style.display = 'none';
          document.getElementById('error-details').style.display = 'block';
          document.getElementById('error-msg').innerText = "REACT_MOUNT_TIMEOUT (5000ms). Check script paths or network.";
        } else {
          // Hide fallback if React mounted successfully
          const fallback = document.getElementById('loading-fallback');
          if (fallback && window.__WEB2APP_STARTED) {
            fallback.style.opacity = '0';
            setTimeout(() => fallback.style.display = 'none', 500);
          }
        }
      }, 5000);
    </script>
  </body>
</html>
